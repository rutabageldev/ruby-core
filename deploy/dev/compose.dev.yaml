# Ruby Core Development Environment
# Phase 1: Secure Infrastructure
#
# ADR-0021: Single-node NATS with JetStream persistence
# ADR-0018: TLS everywhere (mTLS for NATS)
# ADR-0017: NKEY-based authentication
# ADR-0015: Vault for secrets (general-purpose Vault on node)

services:
  # ==========================================================================
  # NATS Certificate Init (fetches server certs from Vault)
  # ==========================================================================
  nats-init:
    image: hashicorp/vault:1.15
    container_name: ruby-core-dev-nats-init
    restart: "no"
    entrypoint: ["/bin/sh"]
    command: ["/scripts/fetch-nats-certs.sh"]
    volumes:
      - nats-certs:/certs
      - ../../scripts/fetch-nats-certs.sh:/scripts/fetch-nats-certs.sh:ro
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
    environment:
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN:-root}
    networks:
      - vault-ruby-core-dev

  # ==========================================================================
  # NATS JetStream Message Broker
  # ==========================================================================
  nats:
    image: nats:2.10-alpine
    container_name: ruby-core-dev-nats
    restart: unless-stopped
    depends_on:
      nats-init:
        condition: service_completed_successfully
    ports:
      # Client port (TLS) — localhost only
      - "127.0.0.1:4222:4222"
      # HTTP monitoring — localhost only (unauthenticated)
      - "127.0.0.1:8222:8222"
    volumes:
      # JetStream persistent storage (ADR-0021)
      - ruby-core-dev-nats-data:/data/jetstream
      # NATS configuration
      - ../base/nats/nats.conf:/etc/nats/nats.conf:ro
      # TLS certificates and auth.conf (fetched/generated from Vault by nats-init)
      - nats-certs:/etc/nats/certs:ro
    command: ["-c", "/etc/nats/nats.conf"]
    networks:
      - default
      - event-bus-dev
    healthcheck:
      # Health check via HTTP monitoring endpoint
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # Gateway Service (profile: services)
  # ==========================================================================
  # Activated with: docker compose --profile services up -d
  # ADR-0015: All secrets from Vault (no cert volume mounts)
  # ADR-0018: mTLS via Vault-sourced client certificates
  # ADR-0020: Dev publishes port to localhost for convenience (no Traefik required).
  #           Production enforces Traefik-only access (no host port, traefik_proxy network).
  gateway:
    profiles: [services]
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    container_name: ruby-core-dev-gateway
    restart: unless-stopped
    networks:
      - default
      - vault-ruby-core-dev
    ports:
      # localhost only — direct access for dev. In prod this port is not published.
      - "127.0.0.1:8090:8080"
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
    environment:
      - ENVIRONMENT=development
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN:-root}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/nats/gateway
      - VAULT_TLS_PATH=secret/data/ruby-core/tls/gateway
      - HTTP_ADDR=:8080

  # ==========================================================================
  # Engine Service (profile: services)
  # ==========================================================================
  engine:
    profiles: [services]
    build:
      context: ../..
      dockerfile: services/engine/Dockerfile
    container_name: ruby-core-dev-engine
    restart: unless-stopped
    networks:
      - default
      - vault-ruby-core-dev
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # Rule files (YAML): loaded at startup, published to NATS KV (ADR-0006)
      - ../../configs/rules:/etc/ruby-core/rules:ro
    environment:
      - ENVIRONMENT=development
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN:-root}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/nats/engine
      - VAULT_TLS_PATH=secret/data/ruby-core/tls/engine
      - RULES_DIR=/etc/ruby-core/rules
      - VAULT_PG_PATH=secret/data/ruby-core/postgres
      - VAULT_HA_PATH=secret/data/ruby-core/ha

  # ==========================================================================
  # Notifier Service (profile: services)
  # ==========================================================================
  # ADR-0020: Dispatches push notifications via HA mobile_app REST API.
  notifier:
    profiles: [services]
    build:
      context: ../..
      dockerfile: services/notifier/Dockerfile
    container_name: ruby-core-dev-notifier
    restart: unless-stopped
    networks:
      - default
      - vault-ruby-core-dev
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
    environment:
      - ENVIRONMENT=development
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN:-root}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/nats/notifier
      - VAULT_TLS_PATH=secret/data/ruby-core/tls/notifier

  # ==========================================================================
  # Presence Service (profile: services)
  # ==========================================================================
  # Multi-source presence fusion with WiFi corroboration and debounce.
  # Subscribes to ha.events.phone.katie; publishes ruby_presence.events.state.katie.
  presence:
    profiles: [services]
    build:
      context: ../..
      dockerfile: services/presence/Dockerfile
    container_name: ruby-core-dev-presence
    restart: unless-stopped
    networks:
      - default
      - vault-ruby-core-dev
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
    environment:
      - ENVIRONMENT=development
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN:-root}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/nats/presence
      - VAULT_TLS_PATH=secret/data/ruby-core/tls/presence
      - VAULT_HA_PATH=secret/data/ruby-core/ha
      - PRESENCE_PERSON_ID=katie
      - PRESENCE_PHONE_ENTITY=phone.katie
      - PRESENCE_WIFI_ENTITY=network.phone.katie
      - PRESENCE_TRUSTED_WIFI=RubyGues,RubyNet,RIoT
      - PRESENCE_DEBOUNCE_SECONDS=120

  # ==========================================================================
  # Audit-Sink Service (profile: services)
  # ==========================================================================
  # ADR-0019: Consumes *.audit.> events from AUDIT_EVENTS stream, archives to NDJSON file.
  audit-sink:
    profiles: [services]
    build:
      context: ../..
      dockerfile: services/audit-sink/Dockerfile
    container_name: ruby-core-dev-audit-sink
    restart: unless-stopped
    networks:
      - default
      - vault-ruby-core-dev
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - ENVIRONMENT=development
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN:-root}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/nats/audit-sink
      - VAULT_TLS_PATH=secret/data/ruby-core/tls/audit-sink
      - AUDIT_DATA_DIR=/data/audit
    volumes:
      - ruby-core-dev-audit-data:/data/audit
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro

# ==========================================================================
# Networks
# ==========================================================================
networks:
  default:
  vault-ruby-core-dev:
    external: true
    name: vault-ruby-core-dev
  # Shared event-bus network — external services (e.g. Navi) join this to reach NATS
  # without coupling to ruby-core's internal compose network.
  # Create with: docker network create event-bus-dev
  event-bus-dev:
    external: true
    name: event-bus-dev

# ==========================================================================
# Named Volumes
# ==========================================================================
volumes:
  # Persistent JetStream storage (dev only)
  # NOTE: For production, ADR-0021 requires a host bind mount to a reliable
  # path that is included in automated backups. Example for prod:
  #   volumes:
  #     - /var/lib/ruby-core/nats:/data/jetstream
  # See deploy/prod/compose.prod.yaml for production configuration.
  ruby-core-dev-nats-data:
    driver: local
  # TLS certificates fetched from Vault by nats-init at startup.
  # Certs live here instead of in the repo tree (deploy/base/nats/certs/).
  # Cleaned up with: docker compose down -v
  nats-certs:
    driver: local
  # Audit event archive (NDJSON). Append-only; not bind-mounted in dev since
  # the data does not need to persist across `docker compose down -v`.
  # Production uses a host bind mount for durable storage and backups.
  ruby-core-dev-audit-data:
    driver: local
