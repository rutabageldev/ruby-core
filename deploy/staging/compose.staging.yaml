# Ruby Core Staging Environment
# Phase 8: Staging stack for pre-release smoke testing (ADR-0013)
#
# Mirrors compose.prod.yaml with staging-specific overrides:
#   - Container names: ruby-core-staging-*
#   - NATS ports: 4224 (client), 8224 (monitor) — coexists with prod (4223/8223)
#   - Vault prefix: secret/ruby-core/staging/* (separate staging credentials)
#   - JetStream + audit: named volumes (ephemeral; removed by deploy-staging.sh on down -v)
#   - No Traefik labels (staging gateway is not publicly routed)
#
# Prerequisites:
#   make setup-staging-creds   # generate secret/ruby-core/staging/* in Vault
#   cp deploy/staging/.env.example deploy/staging/.env  # fill in VAULT_TOKEN
#
# Usage:
#   make staging-up            # start stack
#   make staging-down          # stop and remove volumes
#   make deploy-staging VERSION=v0.5.9   # pull + start + smoke test + tear down

services:
  # ==========================================================================
  # NATS Certificate Init (fetches staging server certs from Vault)
  # ==========================================================================
  nats-init:
    image: hashicorp/vault:1.15
    container_name: ruby-core-staging-nats-init
    restart: "no"
    entrypoint: ["/bin/sh"]
    command: ["/scripts/fetch-nats-certs.sh"]
    volumes:
      - nats-certs:/certs
      - ../../scripts/fetch-nats-certs.sh:/scripts/fetch-nats-certs.sh:ro
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI cert issuance (PLAN-0008).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-nats-server:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-nats-server:/vault/secret-id:ro
    environment:
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      # Direct-PKI path (PLAN-0008): switches fetch-nats-certs.sh to AppRole +
      # pki_int/issue/ruby-core-nats-server. NKEY base stays on legacy KV path
      # (NKEY migration is out of scope; admin/navi externals still on KV).
      - VAULT_PKI_ROLE=ruby-core-nats-server
      - NKEY_BASE=secret/ruby-core/staging/nats
      # Legacy KV path retained as rollback target (unused when VAULT_PKI_ROLE is set).
      - TLS_PATH=secret/ruby-core/staging/tls/nats-server
    networks:
      - vault-ruby-core-staging

  # ==========================================================================
  # NATS JetStream Message Broker (Staging)
  # ==========================================================================
  nats:
    image: nats:2.10-alpine
    container_name: ruby-core-staging-nats
    restart: unless-stopped
    # No nats-init gate: its `service_completed_successfully` state is not
    # re-established on host reboot, which blocked NATS from auto-starting
    # (ADR-0039). NATS now waits for its cert via the wait-for-certs.sh
    # entrypoint, so it recovers on reboot from the persisted cert.
    ports:
      # Staging client port — offset from prod (4223) to allow coexistence
      - "127.0.0.1:4224:4222"
      # Staging HTTP monitor — offset from prod (8223)
      - "127.0.0.1:8224:8222"
    volumes:
      # Staging JetStream: named volume (ephemeral; removed on `down -v`)
      - staging-nats-data:/data/jetstream
      - ../base/nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-certs:/etc/nats/certs:ro
      # Startup guard: blocks until the cert above exists, then exec's
      # nats-server — decouples startup from nats-init (ADR-0039).
      - ../base/nats/wait-for-certs.sh:/usr/local/bin/wait-for-certs.sh:ro
    entrypoint: ["/usr/local/bin/wait-for-certs.sh"]
    command: ["-c", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # NATS Cert Renewer (long-running sidecar — PLAN-0008 Stage 3)
  # ==========================================================================
  # Vault Agent that re-issues the NATS server cert at TTL/2 and SIGHUPs the
  # NATS container to reload TLS without dropping client connections. Mirrors
  # deploy/dev/compose.dev.yaml's nats-cert-renewer; only NATS_CONTAINER differs.
  #
  # See deploy/staging/vault-agent/ for config + template + post-render script.
  # Auth via foundation-agent-ruby-core-nats-server AppRole (foundation PR #78);
  # zero new Vault state required.
  nats-cert-renewer:
    image: foundation/vault-agent:2.0.2
    # Local-only image (built via foundation's `make build-vault-agent-image`,
    # never pushed to a registry per the Dockerfile comment in /opt/foundation/
    # vault-agent/Dockerfile). pull_policy: never skips it during compose pull
    # and uses the host's local image on up -d. The self-hosted GH runner IS
    # this host, so the image is reliably present.
    pull_policy: never
    container_name: ruby-core-staging-nats-cert-renewer
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      nats:
        condition: service_healthy
    command:
      - sh
      - -c
      - vault agent -config=/etc/vault-agent/config.hcl
    environment:
      - NATS_CONTAINER=ruby-core-staging-nats
    volumes:
      - nats-certs:/certs
      - ./vault-agent/config.hcl:/etc/vault-agent/config.hcl:ro
      - ./vault-agent/nats-server.tpl:/etc/vault-agent/nats-server.tpl:ro
      - ./vault-agent/post-render.sh:/etc/vault-agent/post-render.sh:ro
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-nats-server:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-nats-server:/vault/secret-id:ro
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      - ./vault-agent/rendered:/rendered
      - /var/run/docker.sock:/var/run/docker.sock  # allow:docker.sock -- nats-cert-renewer SIGHUP hook (PLAN-0008 Stage 3)
    networks:
      - default
      - vault-ruby-core-staging
    cap_drop:
      - ALL

  # ==========================================================================
  # Gateway Service (Staging)
  # ==========================================================================
  gateway:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-gateway:${VERSION}
    container_name: ruby-core-staging-gateway
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-staging
      - observability
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-gateway:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-gateway:/vault/secret-id:ro
    environment:
      - ENVIRONMENT=production
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/staging/nats/gateway
      - VAULT_TLS_PATH=secret/data/ruby-core/staging/tls/gateway
      - VAULT_PKI_ROLE=ruby-core-gateway
      - HTTP_ADDR=:8080
      # HA ingestion gate: only prod consumes the shared Home Assistant event
      # stream. Non-prod stays off it to avoid duplicate fan-out writes.
      - HA_INGEST_ENABLED=false
      # OTLP export (ADR-0004). OTEL_DEPLOYMENT_ENVIRONMENT overrides ENVIRONMENT=production
      # so staging telemetry is labeled "staging", not "production".
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_DEPLOYMENT_ENVIRONMENT=staging
    # No Traefik labels — staging gateway is not publicly routed

  # ==========================================================================
  # Engine Service (Staging)
  # ==========================================================================
  engine:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-engine:${VERSION}
    container_name: ruby-core-staging-engine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-staging
      - postgres
      - observability
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-engine:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-engine:/vault/secret-id:ro
    environment:
      - ENVIRONMENT=production
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/staging/nats/engine
      - VAULT_TLS_PATH=secret/data/ruby-core/staging/tls/engine
      - VAULT_PKI_ROLE=ruby-core-engine
      - VAULT_PG_PATH=secret/data/ruby-core/staging/postgres
      - VAULT_HA_PATH=secret/data/ruby-core/ha
      # Engine HA push gate (ADR-0033): only prod projects to the shared HA.
      - HA_INGEST_ENABLED=false
      - RULES_DIR=/etc/ruby-core/rules
      - TZ=America/New_York
      # OTLP export (ADR-0004); staging-labeled telemetry (see gateway note).
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_DEPLOYMENT_ENVIRONMENT=staging

  # ==========================================================================
  # API Service (Staging)
  # ==========================================================================
  # Read-only Postgres (SELECT-only role); no NATS. No Traefik (staging is not
  # publicly routed). Pre-conditions: secret/ruby-core/staging/postgres_readonly
  # and secret/ruby-core/staging/api (field: token).
  api:
    # Active read service. REQUIRES host-side prerequisites before this release
    # deploys (docs/runbooks/api-deploy-provisioning.md): a read-only Postgres role
    # at secret/ruby-core/staging/postgres_readonly and the staging api bearer at
    # secret/ruby-core/staging/api.
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-api:${VERSION}
    container_name: ruby-core-staging-api
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-staging
      - postgres
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
    environment:
      - ENVIRONMENT=production
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - HTTP_ADDR=:8080
      - VAULT_PG_PATH=secret/data/ruby-core/staging/postgres_readonly
      - VAULT_API_TOKEN_PATH=secret/data/ruby-core/staging/api
      - TZ=America/New_York

  # ==========================================================================
  # Notifier Service (Staging)
  # ==========================================================================
  notifier:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-notifier:${VERSION}
    container_name: ruby-core-staging-notifier
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-staging
      - observability
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-notifier:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-notifier:/vault/secret-id:ro
    environment:
      - ENVIRONMENT=production
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/staging/nats/notifier
      - VAULT_TLS_PATH=secret/data/ruby-core/staging/tls/notifier
      - VAULT_PKI_ROLE=ruby-core-notifier
      # Uses prod HA credentials — staging smoke test sends a real push notification
      - VAULT_HA_PATH=secret/data/ruby-core/ha
      # OTLP export (ADR-0004); staging-labeled telemetry (see gateway note).
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_DEPLOYMENT_ENVIRONMENT=staging

  # ==========================================================================
  # Presence Service (Staging)
  # ==========================================================================
  presence:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-presence:${VERSION}
    container_name: ruby-core-staging-presence
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-staging
      - observability
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-presence:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-presence:/vault/secret-id:ro
    environment:
      - ENVIRONMENT=production
      # OTLP export (ADR-0004); staging-labeled telemetry (see gateway note).
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_DEPLOYMENT_ENVIRONMENT=staging
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/staging/nats/presence
      - VAULT_TLS_PATH=secret/data/ruby-core/staging/tls/presence
      - VAULT_PKI_ROLE=ruby-core-presence
      - VAULT_HA_PATH=secret/data/ruby-core/ha
      - PRESENCE_PERSON_ID=katie
      - PRESENCE_PHONE_ENTITY=phone.katie
      - PRESENCE_WIFI_ENTITY=network.phone.katie
      - PRESENCE_TRUSTED_WIFI=RubyGues,RubyNet,RIoT
      - PRESENCE_DEBOUNCE_SECONDS=120

  # ==========================================================================
  # Audit-Sink Service (Staging)
  # ==========================================================================
  audit-sink:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-audit-sink:${VERSION}
    container_name: ruby-core-staging-audit-sink
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-staging
      - observability
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=tls://nats:4222
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=secret/data/ruby-core/staging/nats/audit-sink
      - VAULT_TLS_PATH=secret/data/ruby-core/staging/tls/audit-sink
      - VAULT_PKI_ROLE=ruby-core-audit-sink
      - AUDIT_DATA_DIR=/data/audit
      # OTLP export (ADR-0004); staging-labeled telemetry (see gateway note).
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_DEPLOYMENT_ENVIRONMENT=staging
    volumes:
      # Staging audit: named volume (ephemeral; removed on `down -v`)
      - staging-audit-data:/data/audit
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-audit-sink:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-audit-sink:/vault/secret-id:ro

# ==========================================================================
# Networks
# ==========================================================================
networks:
  default:
    name: ruby-core-staging
  vault-ruby-core-staging:
    external: true
    name: vault-ruby-core-staging
  postgres:
    external: true
    name: postgres
  # Foundation observability network (ADR-0004/0028) — shared OTel collector at
  # otel-collector:4317. Owned by /opt/foundation/observability.
  observability:
    external: true
    name: observability

# ==========================================================================
# Volumes
# ==========================================================================
# Named volumes (ephemeral — removed by `docker compose down -v` after smoke test)
volumes:
  nats-certs:
    driver: local
  staging-nats-data:
    driver: local
  staging-audit-data:
    driver: local
