# Ruby Core Production Environment
# Phase 2: Minimal gateway + engine with NATS
#
# ADR-0021: Single-node NATS with host bind mount for backups
# ADR-0018: TLS everywhere
# ADR-0017: NKEY-based authentication
# ADR-0015: Secrets from Vault (general-purpose Vault on node)

services:
  # ==========================================================================
  # NATS Certificate Init (fetches server certs from Vault)
  # ==========================================================================
  nats-init:
    image: hashicorp/vault:1.15
    container_name: ruby-core-prod-nats-init
    restart: "no"
    entrypoint: ["/bin/sh"]
    command: ["/scripts/fetch-nats-certs.sh"]
    volumes:
      - nats-certs:/certs
      - ../../scripts/fetch-nats-certs.sh:/scripts/fetch-nats-certs.sh:ro
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI cert issuance (PLAN-0008 Stage 4).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-nats-server:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-nats-server:/vault/secret-id:ro
    environment:
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      # Direct-PKI path (PLAN-0008 Stage 4): switches fetch-nats-certs.sh to AppRole +
      # pki_int/issue/ruby-core-nats-server. NKEY base stays on legacy KV path
      # (NKEY migration is out of scope; admin/navi externals still on KV).
      - VAULT_PKI_ROLE=ruby-core-nats-server
    networks:
      - vault-ruby-core-prod

  # ==========================================================================
  # NATS JetStream Message Broker (Production)
  # ==========================================================================
  nats:
    image: nats:2.10-alpine
    container_name: ruby-core-prod-nats
    restart: unless-stopped
    # No nats-init gate: its `service_completed_successfully` state is not
    # re-established on host reboot, which blocked NATS from auto-starting
    # (ADR-0039). NATS now waits for its cert via the wait-for-certs.sh
    # entrypoint, so it recovers on reboot from the persisted cert.
    ports:
      # Client port (TLS only) - offset from dev (4222) to allow coexistence
      - "127.0.0.1:4223:4222"
      # HTTP monitoring - localhost only, offset from dev (8222)
      - "127.0.0.1:8223:8222"
    volumes:
      # JetStream persistent storage - HOST BIND MOUNT (ADR-0021)
      # This path MUST be included in automated backups
      - /var/lib/ruby-core/nats:/data/jetstream
      # NATS configuration
      - ../base/nats/nats.conf:/etc/nats/nats.conf:ro
      # TLS certificates and auth.conf (fetched/generated from Vault by nats-init)
      - nats-certs:/etc/nats/certs:ro
      # Startup guard: blocks until the cert above exists, then exec's
      # nats-server — decouples startup from nats-init (ADR-0039).
      - ../base/nats/wait-for-certs.sh:/usr/local/bin/wait-for-certs.sh:ro
    entrypoint: ["/usr/local/bin/wait-for-certs.sh"]
    command: ["-c", "/etc/nats/nats.conf"]
    networks:
      - default
      - event-bus-prod
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # NOTE: Gateway and Engine require Vault connectivity at startup to fetch
  # NKEY seeds and TLS certificates. The general-purpose Vault on this node
  # must be running before starting services.

  # ==========================================================================
  # NATS Cert Renewer (long-running sidecar — PLAN-0008 Stage 4)
  # ==========================================================================
  # Vault Agent that re-issues the NATS server cert at TTL/2 and SIGHUPs the
  # NATS container to reload TLS without dropping client connections.
  # Identical pattern to staging (PR #57); only NATS_CONTAINER differs.
  #
  # See deploy/prod/vault-agent/ for config + template + post-render script.
  # Auth via foundation-agent-ruby-core-nats-server AppRole (foundation PR #78);
  # zero new Vault state required.
  nats-cert-renewer:
    image: foundation/vault-agent:2.0.2
    # Local-only image (built via foundation's `make build-vault-agent-image`,
    # never pushed to a registry). pull_policy: never skips it during compose
    # pull and uses the host's local image on up -d. The self-hosted GH runner
    # IS this host, so the image is reliably present.
    pull_policy: never
    container_name: ruby-core-prod-nats-cert-renewer
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      nats:
        condition: service_healthy
    command:
      - sh
      - -c
      - vault agent -config=/etc/vault-agent/config.hcl
    environment:
      - NATS_CONTAINER=ruby-core-prod-nats
    volumes:
      - nats-certs:/certs
      - ./vault-agent/config.hcl:/etc/vault-agent/config.hcl:ro
      - ./vault-agent/nats-server.tpl:/etc/vault-agent/nats-server.tpl:ro
      - ./vault-agent/post-render.sh:/etc/vault-agent/post-render.sh:ro
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-nats-server:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-nats-server:/vault/secret-id:ro
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      - ./vault-agent/rendered:/rendered
      - /var/run/docker.sock:/var/run/docker.sock  # allow:docker.sock -- nats-cert-renewer SIGHUP hook (PLAN-0008 Stage 4)
    networks:
      - default
      - vault-ruby-core-prod
    cap_drop:
      - ALL

  # ==========================================================================
  # Gateway Service
  # ==========================================================================
  # ADR-0020: Port NOT published to host — all HTTP access goes through Traefik.
  # Traefik validates JWTs before forwarding requests to the gateway.
  gateway:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-gateway:${VERSION:?VERSION env var required}
    container_name: ruby-core-prod-gateway
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-prod
      - traefik_proxy
      - traefik-public
      - observability
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008 Stage 4).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-gateway:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-gateway:/vault/secret-id:ro
    environment:
      - ENVIRONMENT=production
      # OTLP export to the Foundation collector (ADR-0004). Unset => no-op telemetry.
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=${NATS_URL:-tls://nats:4222}
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=${VAULT_NKEY_PATH_GATEWAY:-secret/data/ruby-core/nats/gateway}
      - VAULT_TLS_PATH=${VAULT_TLS_PATH_GATEWAY:-secret/data/ruby-core/tls/gateway}
      - VAULT_PKI_ROLE=ruby-core-gateway
      - HTTP_ADDR=:8080
      # HA ingestion gate: prod is the sole consumer of the shared Home
      # Assistant event stream (state_changed + ada_event).
      - HA_INGEST_ENABLED=true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.ruby-gateway.rule=Host(`${GATEWAY_HOST:-ruby-gateway.internal}`) && PathPrefix(`/`)"
      - "traefik.http.routers.ruby-gateway.entrypoints=websecure"
      - "traefik.http.routers.ruby-gateway.tls=true"
      - "traefik.http.routers.ruby-gateway.middlewares=ruby-gateway-auth"
      - "traefik.http.services.ruby-gateway.loadbalancer.server.port=8080"

  # ==========================================================================
  # API Service (read plane — ROADMAP-0012, ADR-0040)
  # ==========================================================================
  # First synchronous HTTP read API. Connects to Postgres with a SELECT-only
  # role and runs no migrations; no NATS. ADR-0020: port NOT published — Traefik
  # fronts it, and the in-app bearer is defense-in-depth behind the edge gate.
  # Traefik->api mTLS is a planned fast-follow (PLAN-0030 open question).
  #
  # Host-side pre-conditions (provision before first deploy):
  #   - SELECT-only Postgres role at secret/ruby-core/postgres_readonly
  #     (fields: host, port, dbname, user, password)
  #   - API bearer token at secret/ruby-core/api (field: token)
  #   - the ruby-api-auth Traefik middleware in Traefik's dynamic config
  api:
    # Active read service (calendar + household-overlay endpoints). REQUIRES the
    # host-side prerequisites in docs/runbooks/api-deploy-provisioning.md before
    # this release deploys, or the container crash-loops: a read-only Postgres role
    # at secret/ruby-core/postgres_readonly, the api bearer at secret/ruby-core/api,
    # and the ruby-api-auth Traefik middleware.
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-api:${VERSION:?VERSION env var required}
    container_name: ruby-core-prod-api
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-prod
      - postgres
      - traefik_proxy
      - traefik-public
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
    environment:
      - ENVIRONMENT=production
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - HTTP_ADDR=:8080
      - VAULT_PG_PATH=secret/data/ruby-core/postgres_readonly
      - VAULT_API_TOKEN_PATH=secret/data/ruby-core/api
      - TZ=America/New_York
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.ruby-api.rule=Host(`${API_HOST:-ruby-api.internal}`)"
      - "traefik.http.routers.ruby-api.entrypoints=websecure"
      - "traefik.http.routers.ruby-api.tls=true"
      - "traefik.http.routers.ruby-api.middlewares=ruby-api-auth"
      - "traefik.http.services.ruby-api.loadbalancer.server.port=8080"

  # ==========================================================================
  # Engine Service
  # ==========================================================================
  engine:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-engine:${VERSION:?VERSION env var required}
    container_name: ruby-core-prod-engine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-prod
      - postgres
      - observability
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008 Stage 4).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-engine:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-engine:/vault/secret-id:ro
    environment:
      - ENVIRONMENT=production
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=${NATS_URL:-tls://nats:4222}
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=${VAULT_NKEY_PATH_ENGINE:-secret/data/ruby-core/nats/engine}
      - VAULT_TLS_PATH=${VAULT_TLS_PATH_ENGINE:-secret/data/ruby-core/tls/engine}
      - VAULT_PKI_ROLE=ruby-core-engine
      - RULES_DIR=/etc/ruby-core/rules
      - VAULT_PG_PATH=secret/data/ruby-core/postgres
      - VAULT_HA_PATH=secret/data/ruby-core/ha
      # Engine HA push gate (ADR-0033): prod is the sole projector to the shared HA.
      - HA_INGEST_ENABLED=true
      # Calendar sync gate (ADR-0042/0033): only prod connects to the single shared
      # Google calendar. Requires secret/data/ruby-core/google + engine Vault read access.
      - CALENDAR_SYNC_ENABLED=true
      - VAULT_GOOGLE_PATH=secret/data/ruby-core/google
      - TZ=America/New_York
      # OTLP export to the Foundation collector (ADR-0004). Unset => no-op telemetry.
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc

  # ==========================================================================
  # Notifier Service
  # ==========================================================================
  notifier:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-notifier:${VERSION:?VERSION env var required}
    container_name: ruby-core-prod-notifier
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-prod
      - observability
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008 Stage 4).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-notifier:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-notifier:/vault/secret-id:ro
    environment:
      - ENVIRONMENT=production
      # OTLP export to the Foundation collector (ADR-0004). Unset => no-op telemetry.
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=${NATS_URL:-tls://nats:4222}
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=${VAULT_NKEY_PATH_NOTIFIER:-secret/data/ruby-core/nats/notifier}
      - VAULT_TLS_PATH=${VAULT_TLS_PATH_NOTIFIER:-secret/data/ruby-core/tls/notifier}
      - VAULT_PKI_ROLE=ruby-core-notifier

  # ==========================================================================
  # Presence Service
  # ==========================================================================
  # Multi-source presence fusion with WiFi corroboration and debounce.
  presence:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-presence:${VERSION:?VERSION env var required}
    container_name: ruby-core-prod-presence
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-prod
      - observability
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008 Stage 4).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-presence:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-presence:/vault/secret-id:ro
    environment:
      - ENVIRONMENT=production
      # OTLP export to the Foundation collector (ADR-0004). Unset => no-op telemetry.
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=${NATS_URL:-tls://nats:4222}
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=${VAULT_NKEY_PATH_PRESENCE:-secret/data/ruby-core/nats/presence}
      - VAULT_TLS_PATH=${VAULT_TLS_PATH_PRESENCE:-secret/data/ruby-core/tls/presence}
      - VAULT_PKI_ROLE=ruby-core-presence
      - VAULT_HA_PATH=secret/data/ruby-core/ha
      - PRESENCE_PERSON_ID=katie
      - PRESENCE_PHONE_ENTITY=phone.katie
      - PRESENCE_WIFI_ENTITY=network.phone.katie
      - PRESENCE_TRUSTED_WIFI=RubyGues,RubyNet,RIoT
      - PRESENCE_DEBOUNCE_SECONDS=120

  # ==========================================================================
  # Audit-Sink Service
  # ==========================================================================
  # ADR-0019: Consumes *.audit.> events from AUDIT_EVENTS stream, archives to NDJSON file.
  # Runs as root in container (see Dockerfile comment) to write to the host bind mount.
  # Host path: /var/lib/ruby-core/audit — include in automated backup schedule.
  audit-sink:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ruby-core-audit-sink:${VERSION:?VERSION env var required}
    container_name: ruby-core-prod-audit-sink
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - default
      - vault-ruby-core-prod
      - observability
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      # OTLP export to the Foundation collector (ADR-0004). Unset => no-op telemetry.
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - VAULT_ADDR=https://vault:8200
      - VAULT_CACERT=/vault/tls/vault-ca.crt
      - VAULT_TOKEN=${VAULT_TOKEN}
      - NATS_URL=${NATS_URL:-tls://nats:4222}
      - NATS_REQUIRE_MTLS=true
      - VAULT_NKEY_PATH=${VAULT_NKEY_PATH_AUDIT_SINK:-secret/data/ruby-core/nats/audit-sink}
      - VAULT_TLS_PATH=${VAULT_TLS_PATH_AUDIT_SINK:-secret/data/ruby-core/tls/audit-sink}
      - VAULT_PKI_ROLE=ruby-core-audit-sink
      - AUDIT_DATA_DIR=/data/audit
    volumes:
      # HOST BIND MOUNT — include /var/lib/ruby-core/audit in automated backups (ADR-0019).
      # Ensure this directory exists and is writable before first deploy:
      #   mkdir -p /var/lib/ruby-core/audit
      - /var/lib/ruby-core/audit:/data/audit
      - /opt/foundation/vault/tls/vault-ca.crt:/vault/tls/vault-ca.crt:ro
      # AppRole material for direct-PKI client cert (PLAN-0008 Stage 4).
      - /opt/foundation/vault/role-id-foundation-agent-ruby-core-audit-sink:/vault/role-id:ro
      - /opt/foundation/vault/.secret-id-foundation-agent-ruby-core-audit-sink:/vault/secret-id:ro

# ==========================================================================
# Networks
# ==========================================================================
networks:
  default:
  vault-ruby-core-prod:
    external: true
    name: vault-ruby-core-prod
  # Shared event-bus network — external services (e.g. Navi) join this to reach NATS
  # without coupling to ruby-core's internal compose network.
  # Create with: docker network create event-bus-prod
  event-bus-prod:
    external: true
    name: event-bus-prod
  # Traefik proxy network (ADR-0020). Create with: docker network create traefik_proxy
  traefik_proxy:
    external: true
    name: traefik_proxy
  # Traefik public overlay network — gateway must be on this for Traefik file-provider routing.
  traefik-public:
    external: true
    name: traefik-public
  postgres:
    external: true
    name: postgres
  # Foundation observability network (ADR-0004/0028). App services join this to reach
  # the shared OTel collector at otel-collector:4317 for OTLP trace+metric export.
  # Owned by /opt/foundation/observability; created there.
  observability:
    external: true
    name: observability

# ==========================================================================
# Volumes
# ==========================================================================
# JetStream uses a host bind mount (not a named volume) for reliable backups.
# The nats-certs volume stores certs fetched from Vault at startup.
# Certs are not stored in the repo tree. Clean up with: docker compose down -v
volumes:
  nats-certs:
    driver: local
