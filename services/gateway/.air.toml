root = "."
tmp_dir = "/tmp/air-gateway"

[build]
  cmd = "go build -o /tmp/air-gateway/main ./services/gateway"
  bin = "/tmp/air-gateway/main"
  include_ext = ["go"]
  exclude_dir = ["vendor", "testdata", ".git", "deploy", "scripts"]
  delay = 1000
  kill_delay = "500ms"
  rerun = false

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
