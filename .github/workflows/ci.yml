# Ruby Core CI Pipeline (PLAN-0017)
# Authoritative gate for all PRs targeting main.
#
# paths-filter gates downstream work by change type:
#   go     — *.go, go.mod/sum, Dockerfiles, configs/** → full suite + docker-build
#   deploy — deploy/**, scripts/**, Makefile           → lint + security only
#   (neither) — docs only                              → changes job only (~5s)
#
# Stage layout:
#   changes (always)
#   Stage 1 (parallel): lint | security | unit-tests
#   Stage 2 (parallel, needs: unit-tests): integration-tests | docker-build

name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Path filter — determines which downstream jobs run
  # ==========================================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'services/**/Dockerfile'
              - 'configs/**'
            deploy:
              - 'deploy/**'
              - 'scripts/**'
              - 'Makefile'

  # ==========================================================================
  # Stage 1a: Static Analysis & Linting (ADR-0011, ADR-0013)
  # ==========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.8.0
          args: --timeout=5m

  # ==========================================================================
  # Stage 1b: Security Scanning (ADR-0013)
  # ==========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ==========================================================================
  # Stage 1c: Unit Tests (ADR-0012, ADR-0013)
  # ==========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run unit tests
        run: go test -tags=fast -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ==========================================================================
  # Stage 2a: Integration Tests (ADR-0012, ADR-0013)
  # Skipped on draft PRs.
  # ==========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [changes, unit-tests]
    if: needs.changes.outputs.go == 'true' && github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -tags=integration -race -v -timeout=120s ./...

  # ==========================================================================
  # Stage 2b: Docker Build Verification (ADR-0013)
  # Uses GHA cache (warmed by release.yml) so warm builds run ~30s vs ~90s.
  # Gated on go filter — skips for deploy/docs-only PRs.
  # ==========================================================================
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [changes, unit-tests]
    if: needs.changes.outputs.go == 'true'

    strategy:
      fail-fast: false
      matrix:
        service: [gateway, engine, notifier, presence, audit-sink]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=ci-${{ github.sha }}
            COMMIT_SHA=${{ github.sha }}
