# Ruby Core Release Pipeline
# Phase 2: Automated releases on v* tags (ADR-0016)

name: Release

on:
  push:
    tags:
      - 'v*'

  # Manual trigger retained for ad-hoc builds
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ==========================================================================
  # Build and Push Docker Images
  # ==========================================================================
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - gateway
          - engine
          - audit-sink
          - notifier
          - presence

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ruby-core-${{ matrix.service }}
          tags: |
            type=semver,pattern=v{{version}},value=${{ inputs.version || github.ref_name }}
            type=semver,pattern={{version}},value=${{ inputs.version || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version || github.ref_name }}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ inputs.version || github.ref_name }}
            COMMIT_SHA=${{ github.sha }}

  # ==========================================================================
  # Deploy to Staging & Run Smoke Test (Phase 8, ADR-0013)
  # Runs after all images are built. SSHes into the node, checks out the tag,
  # runs deploy-staging.sh which: pulls images, starts the staging stack,
  # runs smoke-test.sh against staging NATS (port 4224), then tears down.
  # create-release only runs if this job passes.
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read

    steps:
      - name: Deploy staging and run smoke test
        run: |
          cd /opt/ruby-core
          git fetch --tags
          git checkout ${{ github.ref_name }}
          VERSION=${{ github.ref_name }} ./scripts/deploy-staging.sh ${{ github.ref_name }}

  # ==========================================================================
  # Deploy to Production & Start Stability Watcher (PLAN-0017)
  # Gated on staging smoke passing. Skipped for -rc tags (staging-only).
  # Stability watcher runs detached via systemd-run for 10 min post-deploy.
  # Prerequisite: GH runner must be installed as a systemd service (svc.sh
  # install) so systemd-run has a session to attach to.
  # ==========================================================================
  deploy-prod:
    name: Deploy to Production
    runs-on: self-hosted
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc')
    permissions:
      contents: read

    steps:
      - name: Deploy production
        run: |
          cd /opt/ruby-core
          git checkout ${{ github.ref_name }}
          VERSION=${{ github.ref_name }} make deploy-prod

      - name: Start stability watcher
        run: |
          mkdir -p /var/log/ruby-core
          nohup setsid /opt/ruby-core/scripts/stability-watch.sh \
            ${{ github.ref_name }} 600 \
            >> /var/log/ruby-core/stability.log 2>&1 &

  # ==========================================================================
  # Create GitHub Release
  # Runs only after prod deploy succeeds. Skipped for -rc tags.
  # ==========================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc')
    permissions:
      contents: write

    steps:
      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          generate_release_notes: true
