get:
  operationId: listDirectoryPeople
  tags:
    - directory
  summary: List directory people
  description: |
    Returns the active people and groups in the household directory — the roster
    that feeds the "FOR" subject picker and childcare-provider linking. Local
    overlay; never reflects Google data.
  responses:
    "200":
      description: The active directory people.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../components/directory.yaml#/Person"
          example:
            - id: "11111111-1111-4111-8111-111111111111"
              display_name: "Katie"
              kind: "person"
              email: "michael.katie.rubanka@gmail.com"
              family: "Rubanka"
              active: true
    "401":
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema:
            $ref: "../components/problem.yaml#/Problem"
          example:
            type: about:blank
            title: Unauthorized
            status: 401
            detail: A valid bearer token is required.
    default:
      description: Unexpected error, as an RFC 9457 Problem Details object.
      content:
        application/problem+json:
          schema:
            $ref: "../components/problem.yaml#/Problem"
          example:
            type: about:blank
            title: Internal Server Error
            status: 500
            detail: An unexpected error occurred.
