CalendarInstance:
  type: object
  description: |
    One concrete occurrence of a calendar event in the requested window. Recurring
    series are expanded into instances server-side, timezone-aware. Times are RFC 3339
    UTC instants; for all-day events `all_day` is true and `end` is EXCLUSIVE (a
    one-day event on the 26th ends on the 27th — surfaced, not hidden; see ADR-0042).
    `subjects` and `childcare` are resolved from the local overlay (populated in the
    household-overlay slice).
  properties:
    google_event_id:
      type: string
      description: The Google event id of the master (or override child) this instance came from.
    summary:
      type: string
      description: The event title.
    start:
      type: string
      format: date-time
      description: Instance start as an RFC 3339 UTC instant.
    end:
      type: string
      format: date-time
      description: Instance end as an RFC 3339 UTC instant (exclusive for all-day events).
    all_day:
      type: boolean
      description: Whether this is an all-day event (date-only in Google).
    status:
      type: string
      description: Google event status — confirmed, tentative, or cancelled.
    location:
      type: string
      description: Free-text location, when set.
    description:
      type: string
      description: Free-text description, when set.
    etag:
      type: string
      description: Mirror etag of the source row (trimmed of Google's surrounding quotes); supply as If-Match on updates.
    recurrence:
      type: array
      items:
        type: string
      description: Raw RRULE/EXDATE/RDATE lines of the series master when this instance comes from a recurring event; empty for single events.
    recurring_event_id:
      type: string
      description: Google event id of the series master when this instance belongs to a recurring series; omitted for single events.
    original_start:
      type: string
      format: date-time
      description: The series occurrence this instance corresponds to (RFC 3339 UTC) — set for recurring/override instances; addresses a single occurrence in per-instance writes.
    subjects:
      type: array
      items:
        type: string
      description: Resolved subject person ids (the "FOR" lane) — local overlay, never written to Google.
    childcare:
      type: string
      description: Resolved childcare provider id for this event; omitted when none — local overlay.
    attendees:
      type: array
      description: Google attendees, each reconciled to a directory person id by email where matched, with Google RSVP status.
      items:
        type: object
        properties:
          email:
            type: string
            description: The attendee's email address (from Google).
          person_id:
            type: string
            description: The matched directory person id, when the email reconciles to a known person.
          response_status:
            type: string
            description: Google RSVP status — needsAction, declined, tentative, or accepted.
        required:
          - email
  required:
    - google_event_id
    - start
    - end
    - all_day
    - status
  example:
    google_event_id: "abc123"
    summary: "Dentist"
    start: "2026-06-26T13:00:00Z"
    end: "2026-06-26T14:00:00Z"
    all_day: false
    status: "confirmed"
    location: "123 Main St"
    description: "Cleaning"
    subjects: []
    attendees:
      - email: "michael.katie.rubanka@gmail.com"
        person_id: "11111111-1111-4111-8111-111111111111"
        response_status: "accepted"
