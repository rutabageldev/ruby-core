# Pre-commit hooks for Ruby Core
# Phase 7 complete: Lint, Secrets, non-Go linters, go mod tidy, fast unit tests (ADR-0011)

repos:
  # ==========================================================================
  # Go - golangci-lint (gofumpt, govet, staticcheck, gosec)
  # ==========================================================================
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.8.0
    hooks:
      - id: golangci-lint
        args: [--fix, --timeout=5m]

  # ==========================================================================
  # Secrets Scanning - gitleaks
  # ==========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: gitleaks
        description: Detect hardcoded secrets in code
        entry: gitleaks protect --staged --verbose
        language: golang
        pass_filenames: false

  # ==========================================================================
  # Dockerfiles - hadolint (via Docker)
  # ==========================================================================
  - repo: https://github.com/AleksaC/hadolint-py
    rev: v2.12.0.3
    hooks:
      - id: hadolint
        name: hadolint
        description: Lint Dockerfiles

  # ==========================================================================
  # YAML - yamllint
  # ==========================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: yamllint
        description: Lint YAML files
        args: [-c, .yamllint.yml]
        types: [yaml]

  # ==========================================================================
  # GitHub Actions - actionlint
  # ==========================================================================
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.4
    hooks:
      - id: actionlint
        name: actionlint
        description: Lint GitHub Actions workflows
        files: ^\.github/workflows/

  # ==========================================================================
  # Markdown - markdownlint (optional)
  # ==========================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        name: markdownlint
        description: Lint Markdown files
        args: [--config, .markdownlint.yml, --fix]
        types: [markdown]

  # ==========================================================================
  # Shell Scripts - shellcheck (optional)
  # ==========================================================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: shellcheck
        description: Lint shell scripts
        types: [shell]
        args: [--severity=warning]

  # ==========================================================================
  # Go - local hooks (go mod tidy + fast unit tests)
  # ==========================================================================
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        files: go\.(mod|sum)$
        pass_filenames: false

      - id: go-test-fast
        name: fast unit tests
        entry: go test -tags=fast ./...
        language: system
        types: [go]
        pass_filenames: false

  # ==========================================================================
  # Pre-push hooks — run once per push, not per commit (PLAN-0017)
  # Install: pre-commit install --hook-type pre-push
  # ==========================================================================
  - repo: local
    hooks:
      - id: no-push-to-main
        name: Prevent direct push to main
        language: system
        entry: bash -c 'b=$(git rev-parse --abbrev-ref HEAD 2>/dev/null); if [ "$b" = "main" ]; then echo "Direct push to main is not allowed. Open a PR." >&2; exit 1; fi'
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      - id: golangci-lint-from-main
        name: golangci-lint (changed since main)
        language: system
        entry: golangci-lint run --new-from-rev=origin/main --timeout=2m
        types: [go]
        stages: [pre-push]
        pass_filenames: false

      - id: go-test-fast-push
        name: go test -tags=fast (pre-push)
        language: system
        entry: go test -tags=fast -race -short ./...
        types: [go]
        stages: [pre-push]
        pass_filenames: false
